name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile
        run: python -m compileall -q src

      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Import smoke
        run: |
          python -c "import sys; sys.path.insert(0,'src'); from core.formats import resolve_preset; from core.utils import is_http_url; from core.license_manager import LS_ACTIVATE; assert resolve_preset('720')['id']=='720'; assert is_http_url('https://x'); assert 'activate' in LS_ACTIVATE"
